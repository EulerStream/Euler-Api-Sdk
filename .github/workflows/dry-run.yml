name: "Dry Run: Generate SDKs"

on:
  workflow_dispatch:
    inputs:
      typescript_bump:
        description: 'TypeScript version bump — skip to not generate'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: patch
      python_bump:
        description: 'Python version bump — skip to not generate'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: patch
      csharp_bump:
        description: 'C# version bump — skip to not generate'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: patch
      java_bump:
        description: 'Java version bump — skip to not generate'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: patch
      go_bump:
        description: 'Go version bump — skip to not generate'
        type: choice
        options:
          - skip
          - patch
          - minor
          - major
        default: patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce master branch
        if: github.ref != 'refs/heads/master'
        run: |
          echo "::error::Dry run must be triggered from the master branch, got ${{ github.ref }}"
          exit 1

  generate:
    needs: check-branch
    uses: ./.github/workflows/sdk-generate.yml
    with:
      typescript: ${{ inputs.typescript_bump != 'skip' }}
      python: ${{ inputs.python_bump != 'skip' }}
      csharp: ${{ inputs.csharp_bump != 'skip' }}
      java: ${{ inputs.java_bump != 'skip' }}
      go: ${{ inputs.go_bump != 'skip' }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  preview-typescript:
    needs: generate
    if: ${{ inputs.typescript_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Preview version bump
        working-directory: sdk/typescript
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          npm version ${{ inputs.typescript_bump }} --no-git-tag-version
          NEXT=$(node -p "require('./package.json').version")
          echo "### TypeScript: $CURRENT → $NEXT" >> $GITHUB_STEP_SUMMARY

  preview-python:
    needs: generate
    if: ${{ inputs.python_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install poetry
        run: pip install poetry

      - name: Preview version bump
        working-directory: sdk/python
        run: |
          CURRENT=$(poetry version -s)
          poetry version ${{ inputs.python_bump }}
          NEXT=$(poetry version -s)
          echo "### Python: $CURRENT → $NEXT" >> $GITHUB_STEP_SUMMARY

  preview-csharp:
    needs: generate
    if: ${{ inputs.csharp_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-csharp
          path: sdk/csharp

      - name: Preview version bump
        run: |
          CURRENT=$(grep '<Version>' sdk/csharp/src/EulerApiSdk.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.csharp_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          echo "### C#: $CURRENT → $NEXT" >> $GITHUB_STEP_SUMMARY

  preview-java:
    needs: generate
    if: ${{ inputs.java_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-java
          path: sdk/java

      - name: Preview version bump
        run: |
          CURRENT=$(grep -m1 '<version>' sdk/java/src/generated/pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d ' ')
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.java_bump }}" in
            patch) PAT=$((PAT+1)) ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          esac
          NEXT="$MAJ.$MIN.$PAT"
          echo "### Java: $CURRENT → $NEXT" >> $GITHUB_STEP_SUMMARY

  preview-go:
    needs: generate
    if: ${{ inputs.go_bump != 'skip' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-go
          path: sdk/go

      - name: Preview version
        run: |
          echo "### Go: published via git tag (no version file)" >> $GITHUB_STEP_SUMMARY
