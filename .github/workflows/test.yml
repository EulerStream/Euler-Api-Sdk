name: Test SDKs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: sdk/typescript
        run: pnpm install

      - name: Run tests
        working-directory: sdk/typescript
        run: |
          pnpm test
          npx tsx ./test/e2e.test.ts

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: sdk/python
        run: pip install httpx attrs python-dateutil

      - name: Run tests
        working-directory: sdk/python
        run: |
          python test/test_basic.py
          python test/test_e2e.py

  test-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        working-directory: sdk/csharp/test
        run: dotnet test

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run tests
        working-directory: sdk/java/src/generated
        run: mvn test

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Run fix script tests
        run: npx tsx sdk/go/test/fix-enum-conflicts.test.ts

      - name: Run SDK tests
        working-directory: sdk/go
        run: go test ./... -v
