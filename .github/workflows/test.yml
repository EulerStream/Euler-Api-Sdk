name: Test SDKs

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: typescript-sdk
        run: pnpm install

      - name: Run tests
        working-directory: typescript-sdk
        run: pnpm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: python-sdk
        run: pip install httpx attrs python-dateutil

      - name: Run tests
        working-directory: python-sdk
        run: python tests/test_basic.py

  test-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        working-directory: csharp-sdk/tests
        run: dotnet test

  test-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run tests
        working-directory: java-sdk/src/generated
        run: mvn test

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        working-directory: go-sdk
        run: go vet ./client.go || true && echo "Go SDK: generated code has known enum conflicts, skipping full test until upstream fix"
