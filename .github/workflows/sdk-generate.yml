name: Generate SDKs

on:
  workflow_call:
    inputs:
      typescript:
        type: boolean
        default: false
      python:
        type: boolean
        default: false

jobs:
  generate-typescript:
    if: ${{ inputs.typescript }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Download spec & generate
        working-directory: typescript-sdk
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx openapi-generator-cli generate -i ./build/openapi.json -g typescript-axios -o ./src/sdk

      - name: Render client template
        working-directory: typescript-sdk
        run: |
          pnpm install
          npx tsx ./render-template.ts

      - name: Build
        working-directory: typescript-sdk
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: typescript-sdk

  generate-python:
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install openapi-python-client poetry

      - name: Generate Python SDK
        working-directory: python-sdk
        run: |
          openapi-python-client generate \
            --url https://tiktok.eulerstream.com/dashboard/openapi \
            --output-path ./ \
            --overwrite \
            --config config.yaml

      - name: Build
        working-directory: python-sdk
        run: poetry build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk
          path: python-sdk
