name: Generate SDKs

on:
  workflow_call:
    inputs:
      typescript:
        type: boolean
        default: false
      python:
        type: boolean
        default: false
      csharp:
        type: boolean
        default: false
      java:
        type: boolean
        default: false
      go:
        type: boolean
        default: false
    secrets:
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false

jobs:
  generate-typescript:
    if: ${{ inputs.typescript }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Download spec & generate
        working-directory: sdk/typescript
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx openapi-generator-cli generate -i ./build/openapi.json -g typescript-axios -o ./src/sdk

      - name: Render client template
        working-directory: sdk/typescript
        run: |
          pnpm install
          npx tsx ./scripts/render-template.ts

      - name: Build
        working-directory: sdk/typescript
        run: pnpm run build

      - name: Test
        working-directory: sdk/typescript
        run: pnpm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript

  generate-python:
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install openapi-python-client poetry

      - name: Generate Python SDK
        working-directory: sdk/python
        run: |
          openapi-python-client generate \
            --url https://tiktok.eulerstream.com/dashboard/openapi \
            --output-path ./ \
            --overwrite \
            --config config.yaml

      - name: Build
        working-directory: sdk/python
        run: poetry build

      - name: Test
        working-directory: sdk/python
        run: python test/test_basic.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python

  generate-csharp:
    if: ${{ inputs.csharp }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/csharp
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g csharp -o ./src/generated \
            --additional-properties=packageName=EulerApiSdk,targetFramework=net8.0,nullableReferenceTypes=true

      - name: Fix enum conflicts
        working-directory: sdk/csharp
        run: npx tsx ./scripts/fix-enum-conflicts.ts

      - name: Render client template
        working-directory: sdk/csharp
        run: npx tsx ./scripts/render-template.ts

      - name: Build
        working-directory: sdk/csharp/src
        run: dotnet build -c Release

      - name: Test
        working-directory: sdk/csharp/test
        run: dotnet test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-csharp
          path: sdk/csharp

  generate-java:
    if: ${{ inputs.java }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/java
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g java -o ./src/generated \
            --additional-properties=groupId=io.github.isaackogan,artifactId=euler-api-sdk,apiPackage=io.github.isaackogan.api,modelPackage=io.github.isaackogan.model,invokerPackage=io.github.isaackogan

      - name: Render client template
        working-directory: sdk/java
        run: npx tsx ./scripts/render-template.ts

      - name: Build
        working-directory: sdk/java/src/generated
        run: mvn package -DskipTests

      - name: Test
        working-directory: sdk/java/src/generated
        run: mvn test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-java
          path: sdk/java

  generate-go:
    if: ${{ inputs.go }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: sdk/go
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g go -o ./generated \
            --additional-properties=packageName=eulerapi,moduleName=github.com/EulerStream/Euler-Api-Sdk/sdk/go
          rm -f ./generated/go.mod ./generated/go.sum

      - name: Fix enum constant conflicts
        run: npx tsx ./sdk/go/scripts/fix-enum-conflicts.ts

      - name: Render client template
        run: npx tsx ./sdk/go/scripts/render-template.ts

      - name: Build
        working-directory: sdk/go
        run: go build ./...

      - name: Test
        working-directory: sdk/go
        run: go test ./... -v

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go

  extract-examples:
    if: always()
    needs: [generate-typescript, generate-python, generate-csharp, generate-java, generate-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Download spec
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi

      - name: Download TypeScript artifact
        if: needs.generate-typescript.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-typescript
          path: sdk/typescript

      - name: Download Python artifact
        if: needs.generate-python.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python

      - name: Download C# artifact
        if: needs.generate-csharp.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-csharp
          path: sdk/csharp

      - name: Download Java artifact
        if: needs.generate-java.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-java
          path: sdk/java

      - name: Download Go artifact
        if: needs.generate-go.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sdk-go
          path: sdk/go

      - name: Collect docs into sdk-examples/docs
        run: |
          mkdir -p sdk-examples/docs
          [ -d sdk/typescript/src/sdk/docs ] && cp -r sdk/typescript/src/sdk/docs sdk-examples/docs/typescript || true
          [ -d sdk/java/src/generated/docs ] && cp -r sdk/java/src/generated/docs sdk-examples/docs/java || true
          [ -d sdk/go/generated/docs ] && cp -r sdk/go/generated/docs sdk-examples/docs/go || true
          [ -d sdk/csharp/src/generated/docs/apis ] && cp -r sdk/csharp/src/generated/docs/apis sdk-examples/docs/csharp || true
          [ -d sdk/python/EulerApiSdk/api ] && cp -r sdk/python/EulerApiSdk/api sdk-examples/docs/python || true
          echo "Collected docs:"
          ls -la sdk-examples/docs/

      - name: Run extract
        working-directory: sdk-examples
        run: npx tsx extract.ts

      - name: Upload examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-examples-output
          path: sdk-examples/output/

      - name: Upload examples to R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install awscli
          for f in sdk-examples/output/*.json; do
            slug=$(basename "$f" .json)
            aws s3 cp "$f" "s3://eulerstream-web/sdk-examples/${slug}.json" \
              --endpoint-url https://f00699f0017e82344b8bed18c38dab38.r2.cloudflarestorage.com \
              --content-type application/json
            echo "Uploaded sdk-examples/${slug}.json"
          done
