name: Generate SDKs

on:
  workflow_call:
    inputs:
      typescript:
        type: boolean
        default: false
      python:
        type: boolean
        default: false
      csharp:
        type: boolean
        default: false
      java:
        type: boolean
        default: false
      go:
        type: boolean
        default: false

jobs:
  generate-typescript:
    if: ${{ inputs.typescript }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install root dependencies
        run: pnpm install

      - name: Download spec & generate
        working-directory: typescript-sdk
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx openapi-generator-cli generate -i ./build/openapi.json -g typescript-axios -o ./src/sdk

      - name: Render client template
        working-directory: typescript-sdk
        run: |
          pnpm install
          npx tsx ./render-template.ts

      - name: Build
        working-directory: typescript-sdk
        run: pnpm run build

      - name: Test
        working-directory: typescript-sdk
        run: pnpm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: typescript-sdk

  generate-python:
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: pip install openapi-python-client poetry

      - name: Generate Python SDK
        working-directory: python-sdk
        run: |
          openapi-python-client generate \
            --url https://tiktok.eulerstream.com/dashboard/openapi \
            --output-path ./ \
            --overwrite \
            --config config.yaml

      - name: Build
        working-directory: python-sdk
        run: poetry build

      - name: Test
        working-directory: python-sdk
        run: python tests/test_basic.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk
          path: python-sdk

  generate-csharp:
    if: ${{ inputs.csharp }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: csharp-sdk
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g csharp -o ./src/generated \
            --additional-properties=packageName=EulerApiSdk,targetFramework=net8.0,nullableReferenceTypes=true

      - name: Fix enum conflicts
        working-directory: csharp-sdk
        run: npx tsx ./fix-enum-conflicts.ts

      - name: Render client template
        working-directory: csharp-sdk
        run: npx tsx ./render-template.ts

      - name: Build
        working-directory: csharp-sdk/src
        run: dotnet build -c Release

      - name: Test
        working-directory: csharp-sdk/tests
        run: dotnet test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: csharp-sdk
          path: csharp-sdk

  generate-java:
    if: ${{ inputs.java }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: java-sdk
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g java -o ./src/generated \
            --additional-properties=groupId=com.eulerstream,artifactId=euler-api-sdk,apiPackage=com.eulerstream.api,modelPackage=com.eulerstream.model,invokerPackage=com.eulerstream

      - name: Render client template
        working-directory: java-sdk
        run: npx tsx ./render-template.ts

      - name: Build
        working-directory: java-sdk/src/generated
        run: mvn package -DskipTests

      - name: Test
        working-directory: java-sdk/src/generated
        run: mvn test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk
          path: java-sdk

  generate-go:
    if: ${{ inputs.go }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install root dependencies
        run: npm install -g pnpm && pnpm install

      - name: Download spec & generate
        working-directory: go-sdk
        run: |
          mkdir -p build
          wget -O ./build/openapi.json https://tiktok.eulerstream.com/dashboard/openapi
          npx @openapitools/openapi-generator-cli generate \
            -i ./build/openapi.json -g go -o ./generated \
            --additional-properties=packageName=eulerapi,moduleName=github.com/EulerStream/Euler-Api-Sdk/go-sdk
          rm -f ./generated/go.mod ./generated/go.sum

      - name: Fix enum constant conflicts
        run: npx tsx ./go-sdk/fix-enum-conflicts.ts

      - name: Render client template
        run: npx tsx ./go-sdk/render-template.ts

      - name: Build
        working-directory: go-sdk
        run: go build ./...

      - name: Test
        working-directory: go-sdk
        run: go test ./... -v

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk
          path: go-sdk
