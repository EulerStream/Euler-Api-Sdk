boilerplate:
  showImports: true

variables:
  sdkImport: "from EulerApiSdk.client import AuthenticatedClient"
  sdkPackage: EulerApiSdk
  clientConstruction: |
    client = AuthenticatedClient(
        base_url="$baseUrl",
        token="$apiKey",
    )
  clientVar: client

templatePath: ./python-wrapper.mustache

outputFormats:
  - md
  - json

apiClassMap:
  "TikTok LIVE": tik_tok_live
  "TikTok LIVE Premium": tik_tok_live_premium
  "TikTok LIVE Moderation": tik_tok_live_moderation
  "TikTok General": tik_tok_general
  "TikTok Captchas": tik_tok_captchas
  Analytics: analytics
  "TikTok LIVE Alerts": tik_tok_live_alerts
  "TikTok LIVE Alert Targets": tik_tok_live_alert_targets
  Accounts: accounts
  Authentication: authentication

paramOverrides:
  global:
    account_id: $accountId
