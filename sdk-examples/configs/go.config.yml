boilerplate:
  showImports: true

variables:
  sdkImport: |
    import (
    	"context"
    	eulerstream "github.com/EulerStream/Euler-Api-Sdk/sdk/go"
    )
  clientConstruction: |
    client := eulerstream.NewEulerStreamClient(
    	eulerstream.WithAPIKey("$apiKey"),
    	eulerstream.WithServerURL("$baseUrl"),
    )
  clientVar: client
  apiAccessPattern: dot

templatePath: ./wrapper.mustache

outputFormats:
  - md
  - json

apiClassMap:
  "TikTok LIVE": Webcast
  Accounts: Accounts
  Authentication: Authentication
  Analytics: Analytics
  Alerts: Alerts
  "Alert Targets": AlertTargets
  Captchas: Captchas

paramOverrides:
  global:
    account_id: $accountId
    alert_id: $alertId
    target_id: $targetId
