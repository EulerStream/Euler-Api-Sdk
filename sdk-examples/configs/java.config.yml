boilerplate:
  showImports: true

variables:
  sdkImport: "import io.github.isaackogan.EulerStreamApiClient;"
  clientConstruction: |
    EulerStreamApiClient client = EulerStreamApiClient.builder()
        .basePath("$baseUrl")
        .apiKey("$apiKey")
        .build();
  clientVar: client
  apiAccessPattern: call

templatePath: ./wrapper.mustache

outputFormats:
  - md
  - json

apiClassMap:
  "TikTok LIVE": webcast
  Accounts: accounts
  Authentication: authentication
  Analytics: analytics
  Alerts: alerts
  "Alert Targets": alertTargets
  Captchas: captchas

paramOverrides:
  global:
    account_id: $accountId
